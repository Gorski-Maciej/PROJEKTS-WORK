      interval: 15s
      timeout: 5s
      retries: 5
  netaegis:
    build: ./netaegis
    env_file: ./netaegis/.env.example
    ports:
      - "9004:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5
