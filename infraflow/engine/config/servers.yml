global:
  check_interval: 300
servers:
  - name: web-prod-01
    host: 127.0.0.1
    user: root
    key_file: /app/keys/id_rsa
    checks:
      - type: cpu
        threshold: 80
        actions:
          - type: restart_service
            target: nginx
            condition: "cpu > 90"
          - type: send_slack
            message: "CPU high on {server.name}: {metric}%"
      - type: memory
        threshold: 85
        actions:
          - type: clean_logs
            path: /var/log
            condition: "memory > 95"
