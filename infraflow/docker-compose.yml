version: '3.9'
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  timescaledb:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg14
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d infraflow"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: infraflow
      POSTGRES_DB: infraflow
    ports: ["56432:5432"]
    volumes: ["timescale_data:/var/lib/postgresql/data"]

  engine:
    restart: unless-stopped
    build:
      context: ./engine
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://postgres:infraflow@timescaledb:5432/infraflow
      CONFIG_PATH: /app/config/servers.yml
      JWT_SECRET: ${JWT_SECRET}
    ports: ["8001:8000"]
    volumes:
      - ./engine:/app
      - ./keys:/app/keys:ro

  worker:
    restart: unless-stopped
    build:
      context: ./engine
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://postgres:infraflow@timescaledb:5432/infraflow
      CONFIG_PATH: /app/config/servers.yml
      JWT_SECRET: ${JWT_SECRET}
    command: ["python","worker/queue_worker.py"]
    volumes:
      - ./engine:/app
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import redis; redis.Redis(host='redis').ping()"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    restart: unless-stopped
    build: ./dashboard
    depends_on:
      engine:
        condition: service_healthy
    ports: ["8081:8080"]
    environment:
      ENGINE_URL: http://engine:8000

  prometheus:
    restart: unless-stopped
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9290:9090"]

  grafana:
    restart: unless-stopped
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports: ["3200:3000"]

volumes:
  timescale_data:
    driver: local
  redis_data:
    driver: local
