version: '3.9'
services:
  main_mcp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: server/main_mcp/Dockerfile
    ports:
      - "8400:8000"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/realtime/health', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  operational_mcp:
    restart: unless-stopped
    build:
      context: .
      dockerfile: server/operational_mcp/Dockerfile
    ports:
      - "8401:8001"
    environment:
      MAIN_MCP_URL: http://main_mcp:8000
    depends_on:
      main_mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/api/status/', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    restart: unless-stopped
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3400:3000"
    depends_on:
      main_mcp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  netpulse_agent:
    restart: unless-stopped
    build:
      context: .
      dockerfile: agents/netpulse/Dockerfile
    environment:
      OPERATIONAL_MCP_URL: http://operational_mcp:8001
      NETPULSE_AGENT_ID: netpulse-01
      NETPULSE_INTERVAL: "30"
    depends_on:
      operational_mcp:
        condition: service_healthy

  seclog_agent:
    restart: unless-stopped
    build:
      context: .
      dockerfile: agents/seclog/Dockerfile
    volumes:
      - /var/log:/var/log:ro
    environment:
      OPERATIONAL_MCP_URL: http://operational_mcp:8001
      SECLOG_AGENT_ID: seclog-01
      SECLOG_WATCH_PATHS: /var/log/auth.log,/var/log/nginx/access.log
    depends_on:
      operational_mcp:
        condition: service_healthy

  netconfig_agent:
    restart: unless-stopped
    build:
      context: .
      dockerfile: agents/netconfig/Dockerfile
    environment:
      OPERATIONAL_MCP_URL: http://operational_mcp:8001
      NETCONFIG_AGENT_ID: netconfig-01
      NETCONFIG_LOCAL_REPO: /app/.agent-configs
      NETCONFIG_DEVICE_IP: 192.168.1.1
      NETCONFIG_DEVICE_USERNAME: admin
      NETCONFIG_DEVICE_PASSWORD: admin
    depends_on:
      operational_mcp:
        condition: service_healthy
