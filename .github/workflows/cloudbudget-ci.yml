name: cloudbudget-ci

on:
  push:
    paths:
      - 'cloudbudget/**'
      - '.github/workflows/cloudbudget-ci.yml'
  pull_request:
    paths:
      - 'cloudbudget/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloudbudget
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q
