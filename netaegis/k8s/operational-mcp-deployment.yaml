apiVersion: apps/v1
kind: Deployment
metadata:
  name: netaegis-operational-mcp
spec:
  replicas: 1
  selector:
    matchLabels: { app: netaegis-operational-mcp }
  template:
    metadata:
      labels: { app: netaegis-operational-mcp }
    spec:
      containers:
        - name: operational-mcp
          image: netaegis-operational:latest
          ports:
            - containerPort: 8001
          env:
            - name: MAIN_MCP_URL
              value: http://netaegis-main-mcp:8000
          readinessProbe:
            httpGet:
              path: /api/status/
              port: 8001
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status/
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 20
