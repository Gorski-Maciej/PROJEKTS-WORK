services:
  main_mcp:
    build:
      context: .
      dockerfile: server/main_mcp/Dockerfile
    ports:
      - "8000:8000"

  operational_mcp:
    build:
      context: .
      dockerfile: server/operational_mcp/Dockerfile
    ports:
      - "8001:8001"
    depends_on:
      - main_mcp

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - main_mcp
