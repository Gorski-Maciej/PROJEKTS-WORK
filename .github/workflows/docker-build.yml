name: Docker Build

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'cloudbudget/**'
      - 'infraflow/**'
      - 'netguardian/**'
      - 'netaegis/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [cloudbudget, infraflow, netguardian, netaegis]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build service images
        run: |
          docker compose -f "${{ matrix.service }}/docker-compose.yml" build
      - name: Push service images (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          images=$(docker compose -f "${{ matrix.service }}/docker-compose.yml" config | awk '/image:/ {print $2}')
          for img in $images; do docker push "$img"; done
