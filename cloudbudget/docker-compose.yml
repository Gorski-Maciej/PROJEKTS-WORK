version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg2://cloudbudget:cloudbudget@postgres:5432/cloudbudget
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DUCKDB_PATH: /data/cloudbudget.duckdb
    ports: ["8100:8000"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - duckdb_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: celery -A api.core.celery_app.celery_app worker -Q cost.ingest,cost.analyze,action.exec --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg2://cloudbudget:cloudbudget@postgres:5432/cloudbudget
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      DUCKDB_PATH: /data/cloudbudget.duckdb
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import celery; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  postgres:
    image: postgres:16
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cloudbudget -d cloudbudget"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloudbudget
      POSTGRES_USER: cloudbudget
      POSTGRES_PASSWORD: cloudbudget
    ports: ["55432:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    ports: ["56379:6379"]

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports: ["55672:5672", "15673:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports: ["3100:3000"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  duckdb_data: {}
  postgres_data: {}
  rabbitmq_data: {}
  redis_data: {}
