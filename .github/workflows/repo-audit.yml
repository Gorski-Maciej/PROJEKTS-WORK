name: Repository Audit and Validation

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  audit-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install audit dependencies
        run: python -m pip install --upgrade pip

      - name: Validate env examples
        run: make validate-env

      - name: Run static repository audit
        run: make audit

      - name: Verify host port uniqueness
        run: make verify-ports

