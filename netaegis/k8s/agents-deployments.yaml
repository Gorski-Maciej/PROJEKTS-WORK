apiVersion: apps/v1
kind: Deployment
metadata:
  name: netaegis-netpulse-agent
spec:
  replicas: 1
  selector:
    matchLabels: { app: netaegis-netpulse-agent }
  template:
    metadata:
      labels: { app: netaegis-netpulse-agent }
    spec:
      containers:
        - name: netpulse-agent
          image: python:3.12-slim
          workingDir: /app
          command: ["sh", "-c", "pip install --no-cache-dir -r agents/netpulse/requirements.txt && python -m agents.netpulse.agent"]
          env:
            - name: OPERATIONAL_MCP_URL
              value: http://netaegis-operational-mcp:8001
---
