version: '3.9'

services:
  zookeeper:
    restart: unless-stopped
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD", "sh", "-c", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 20s
      timeout: 5s
      retries: 5

  kafka:
    restart: unless-stopped
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "19092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 20s
      timeout: 10s
      retries: 5

  redis:
    restart: unless-stopped
    image: redis:7-alpine
    ports:
      - "66379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5

  timescaledb:
    restart: unless-stopped
    image: timescale/timescaledb:latest-pg14
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d netguardian"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_PASSWORD: netguardian
      POSTGRES_DB: netguardian
    ports:
      - "65432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data


  engine:
    restart: unless-stopped
    build: ./engine
    working_dir: /app
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      DATABASE_URL: postgresql://postgres:netguardian@timescaledb:5432/netguardian
      # NetGuardian uses embedded DuckDB file storage (no duckdb-api service required)
      DUCKDB_PATH: /data/netguardian.db
      ABUSEIPDB_API_KEY: ${ABUSEIPDB_API_KEY}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL}
      MISP_URL: ${MISP_URL}
      MISP_KEY: ${MISP_KEY}
      SSH_PRIVATE_KEY_FILE: /app/ssh/id_rsa
      SSH_AGENT_HOST: agent
      SSH_AGENT_USER: root
      GEOIP_DB: /app/data/GeoLite2-City.mmdb
      SKIP_GEOIP_CHECK: ${SKIP_GEOIP_CHECK:-true}
      JWT_SECRET: ${JWT_SECRET:-change_me_32_chars_min}
    ports:
      - "8300:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 20s
      timeout: 5s
      retries: 5
    volumes:
      - ./engine:/app
      - ssh_keys:/app/ssh
      - ./engine/data:/app/data
      - duckdb_data:/data

  agent:
    restart: unless-stopped
    build: ./agent
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AGENT_ID: agent-01
    volumes:
      - ./agent/authorized_keys:/root/.ssh/authorized_keys:ro
    cap_add:
      - NET_ADMIN
      - NET_RAW

  dashboard:
    restart: unless-stopped
    build: ./dashboard
    depends_on:
      engine:
        condition: service_healthy
    ports:
      - "8301:8080"
    environment:
      ENGINE_WS_URL: ws://engine:8000/ws

  prometheus:
    restart: unless-stopped
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9390:9090"

  grafana:
    restart: unless-stopped
    image: grafana/grafana
    ports:
      - "3300:3000"
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin

volumes:
  timescale_data:
  duckdb_data:
  ssh_keys:
