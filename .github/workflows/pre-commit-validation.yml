name: Pre-commit Validation

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Prepare env files
        run: |
          for p in cloudbudget infraflow netguardian netaegis; do
            cp -n "$p/.env.example" "$p/.env"
          done
      - name: Validate env and docker availability
        run: make validate-env check-docker
      - name: Verify ports
        run: ./verify_all_ports.sh
