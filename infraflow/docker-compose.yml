version: '3.9'
services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped

  timescaledb:
    image: timescale/timescaledb:latest-pg14
    environment:
      POSTGRES_PASSWORD: infraflow
      POSTGRES_DB: infraflow
    ports: ["56432:5432"]
    volumes: ["timescale_data:/var/lib/postgresql/data"]

  engine:
    build: ./engine
    depends_on: [redis, timescaledb]
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://postgres:infraflow@timescaledb:5432/infraflow
      CONFIG_PATH: /app/config/servers.yml
    ports: ["8001:8000"]
    volumes:
      - ./engine:/app
      - ./keys:/app/keys:ro

  worker:
    build: ./engine
    depends_on: [redis, timescaledb]
    env_file: .env
    environment:
      REDIS_HOST: redis
      DATABASE_URL: postgresql://postgres:infraflow@timescaledb:5432/infraflow
      CONFIG_PATH: /app/config/servers.yml
    command: ["python","worker/queue_worker.py"]
    volumes:
      - ./engine:/app
      - ./keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "python", "-c", "print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: ./dashboard
    depends_on: [engine]
    ports: ["8081:8080"]
    environment:
      ENGINE_URL: http://engine:8000

  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports: ["9290:9090"]

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    ports: ["3200:3000"]

volumes:
  timescale_data:
    driver: local
