name: nn-generated-project-ci

on:
  push:
    paths:
      - 'tools/nn_build_project.py'
      - 'tests_test_nn_build.sh'
      - '_nn.txt'
      - '.github/workflows/nn-generated-project-ci.yml'
  pull_request:
    paths:
      - 'tools/nn_build_project.py'
      - 'tests_test_nn_build.sh'
      - '_nn.txt'
      - '.github/workflows/nn-generated-project-ci.yml'

jobs:
  build-and-test-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Run nn-build test harness
        run: ./tests_test_nn_build.sh
