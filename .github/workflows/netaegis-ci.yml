name: netaegis-ci

on:
  push:
    paths:
      - 'netaegis/**'
  pull_request:
    paths:
      - 'netaegis/**'

jobs:
  tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: netaegis
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run MCP and agent tests
        run: pytest -q tests/test_mcp_flow.py tests/test_agents.py

      - name: Compile agent modules
        run: python -m compileall -q agents
